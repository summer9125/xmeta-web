<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMeta 数字藏品分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111625;
            --bg-card: rgba(17, 22, 37, 0.8);
            --primary: #00d9ff;
            --secondary: #00ff88;
            --accent: #7b61ff;
            --danger: #ff4757;
            --warning: #ffa502;
            --text-primary: #ffffff;
            --text-secondary: #8b9bb4;
            --border: rgba(0, 217, 255, 0.2);
            --glow: 0 0 20px rgba(0, 217, 255, 0.3);
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(123, 97, 255, 0.1) 0%, transparent 50%);
        }
        
        /* 动态背景网格 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 顶部导航 */
        .header {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 217, 255, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--glow);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 24px;
            font-size: 13px;
            color: var(--secondary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        
        .status-dot {
            width: 8px; height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--glow);
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }
        
        /* 主容器 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2);
            border-color: var(--primary);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-top: 8px;
        }
        
        .trend-up {
            background: rgba(0, 255, 136, 0.1);
            color: var(--secondary);
        }
        
        .trend-down {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
        }
        
        /* 内容区块 */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 2px;
        }
        
        /* 列表项 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .list-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: var(--primary);
            transform: translateX(5px);
        }
        
        .list-item:last-child {
            margin-bottom: 0;
        }
        
        .item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .item-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(123, 97, 255, 0.2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 1px solid var(--border);
        }
        
        .item-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .item-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .item-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }
        
        .item-right {
            text-align: right;
        }
        
        .item-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }
        
        .item-change {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header { padding: 16px 20px; flex-direction: column; gap: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
            .list-item { flex-direction: column; align-items: flex-start; gap: 16px; }
            .item-right { text-align: left; }
            .stat-value { font-size: 32px; }
        }
        
        /* 数据闪烁效果 */
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .flash {
            animation: flash 1s ease;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <header class="header">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <div class="logo-text">XMeta 分析系统</div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>实时监控中</span>
            </div>
            <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>正在加载实时数据...</div>
        </div>

        <div id="content" style="display: none;">
            <!-- 统计卡片区 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总市值</div>
                    <div class="stat-value" id="totalCap">¥30.5 亿</div>
                    <div class="stat-trend trend-up">
                        <span>📈</span>
                        <span>+2.3% (24h)</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">24h 交易量</div>
                    <div class="stat-value" id="totalVolume">35,845</div>
                    <div class="stat-trend trend-up">
                        <span>📈</span>
                        <span>+15.3%</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">追踪藏品</div>
                    <div class="stat-value" id="collectionCount">10</div>
                    <div class="stat-trend" style="background: rgba(123, 97, 255, 0.1); color: var(--accent);">
                        <span>📊</span>
                        <span>实时更新</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">市场情绪</div>
                    <div class="stat-value" id="marketSentiment">🐂 牛市</div>
                    <div class="stat-trend trend-up">
                        <span>😊</span>
                        <span>乐观</span>
                    </div>
                </div>
            </div>

            <!-- 热门藏品 -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">🔥 热门藏品</div>
                    <div style="color: var(--text-secondary); font-size: 13px;">
                        更新于 <span id="updateTime">刚刚</span>
                    </div>
                </div>
                <div class="list-item" id="collectionList"></div>
            </div>

            <!-- 发售日历 -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">📅 发售日历</div>
                    <div style="color: var(--text-secondary); font-size: 13px;">即将上线</div>
                </div>
                <div class="list-item" id="releaseList"></div>
            </div>

            <!-- 板块行情 -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">📊 板块行情</div>
                    <div style="color: var(--text-secondary); font-size: 13px;">实时数据</div>
                </div>
                <div class="list-item" id="sectorList"></div>
            </div>
        </div>
    </main>

    <script>
        const API_CONFIG = {
            appId: 'a134eb307ad7429a9c5acd057f3de519',
            baseUrl: 'https://xmeta.x-metash.cn/api'
        };

        const mockData = {
            market: { totalCap: 30.5, volume: 35845, trend: 2.3, sentiment: 'bullish' },
            collections: [
                { id: 1, name: '朱墨三色锦鲤', platform: '鲸探', price: 1.00, change: 2.5, volume: 422026 },
                { id: 2, name: '黑白双色锦鲤', platform: '鲸探', price: 1.42, change: -1.2, volume: 159059 },
                { id: 3, name: '金刚菩提子', platform: '鲸探', price: 1.11, change: 0.8, volume: 40101 },
                { id: 4, name: '小金猫', platform: '鲸探', price: 30.18, change: 5.2, volume: 10331 },
                { id: 5, name: '长春园铜麒麟', platform: '鲸探', price: 106.0, change: -2.1, volume: 254 },
                { id: 6, name: '镇馆之宝 - 秦蕃禺漆盒', platform: '鲸探', price: 599, change: 10.5, volume: 22 }
            ],
            releases: [
                { time: '今天 12:00', name: '晚来急雨添飞瀑图', platform: '鲸探', price: 60, limit: 8000 },
                { time: '今天 12:00', name: '苏轼《楷书祭黄几道文》', platform: '鲸探', price: 60, limit: 8000 },
                { time: '明天 11:00', name: 'KOOMAN•贤勇将军李信', platform: '鲸探', price: 40, limit: 8000 }
            ],
            sectors: [
                { name: '个创板块', cap: 7.75, change: -0.05, volume: 1564 },
                { name: '字画板块', cap: 6.60, change: -0.18, volume: 3686 },
                { name: '文物板块', cap: 6.29, change: 0.38, volume: 2063 },
                { name: '官方板块', cap: 4.15, change: -0.31, volume: 4893 },
                { name: '祈福板块', cap: 3.29, change: -1.54, volume: 20667 }
            ]
        };

        function renderCollections() {
            document.getElementById('collectionList').innerHTML = mockData.collections.map(c => `
                <div class="list-item">
                    <div class="item-left">
                        <div class="item-icon">🎨</div>
                        <div class="item-info">
                            <div class="item-name">${c.name}</div>
                            <div class="item-meta">
                                <span>${c.platform}</span>
                                <span>•</span>
                                <span>在售 ${c.volume.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-price">¥${c.price < 10 ? c.price.toFixed(2) : c.price.toLocaleString()}</div>
                        <div class="item-change ${c.change >= 0 ? 'trend-up' : 'trend-down'}" style="background: ${c.change >= 0 ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.1)'}">
                            ${c.change >= 0 ? '📈' : '📉'} ${c.change >= 0 ? '+' : ''}${c.change}%
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderReleases() {
            document.getElementById('releaseList').innerHTML = mockData.releases.map(r => `
                <div class="list-item">
                    <div class="item-left">
                        <div class="item-icon">📅</div>
                        <div class="item-info">
                            <div class="item-name">${r.name}</div>
                            <div class="item-meta">
                                <span>${r.time}</span>
                                <span>•</span>
                                <span>${r.platform}</span>
                                <span>•</span>
                                <span>限量 ${r.limit}</span>
                            </div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-price">¥${r.price}</div>
                        <div class="item-meta">发售价格</div>
                    </div>
                </div>
            `).join('');
        }

        function renderSectors() {
            document.getElementById('sectorList').innerHTML = mockData.sectors.map(s => `
                <div class="list-item">
                    <div class="item-left">
                        <div class="item-icon">📊</div>
                        <div class="item-info">
                            <div class="item-name">${s.name}</div>
                            <div class="item-meta">
                                <span>市值 ¥${s.cap}亿</span>
                                <span>•</span>
                                <span>交易 ${s.volume}</span>
                            </div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-change ${s.change >= 0 ? 'trend-up' : 'trend-down'}" style="background: ${s.change >= 0 ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.1)'}">
                            ${s.change >= 0 ? '📈' : '📉'} ${s.change >= 0 ? '+' : ''}${s.change}%
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            
            // 更新更新时间
            document.getElementById('updateTime').textContent = '刚刚';
            
            // 尝试获取真实数据
            try {
                const response = await fetch(`${API_CONFIG.baseUrl}/v1/market/overview`, {
                    headers: { 'X-App-ID': API_CONFIG.appId }
                });
                if (response.ok) {
                    const data = await response.json();
                    console.log('真实数据:', data);
                }
            } catch (e) {
                console.log('使用模拟数据');
            }
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                renderCollections();
                renderReleases();
                renderSectors();
                
                // 添加闪烁效果
                document.querySelectorAll('.stat-card').forEach((card, i) => {
                    setTimeout(() => {
                        card.classList.add('flash');
                        setTimeout(() => card.classList.remove('flash'), 1000);
                    }, i * 100);
                });
            }, 800);
        }

        // 初始化
        refreshData();
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
