<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMeta 数字藏品分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-light: #a7f3d0;
            --warning: #f59e0b;
            --warning-light: #fde68a;
            --danger: #ef4444;
            --danger-light: #fecaca;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .logo-subtitle {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
        }
        
        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            background: var(--bg-primary);
            color: var(--primary);
        }
        
        .nav-link.active {
            background: var(--primary);
            color: white;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--success-light);
            border-radius: 20px;
            font-size: 13px;
            color: var(--success);
            font-weight: 500;
        }
        
        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .refresh-btn {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #000;
            transform: translateY(-1px);
        }
        
        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* 页面标题 */
        .page-header {
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 600px;
        }
        
        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .stat-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
        }
        
        .trend-up {
            background: var(--success-light);
            color: var(--success);
        }
        
        .trend-down {
            background: var(--danger-light);
            color: var(--danger);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .stat-footer {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 1024px) {
            .content-grid { grid-template-columns: 1fr; }
        }
        
        /* 内容区块 */
        .section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-actions {
            display: flex;
            gap: 8px;
        }
        
        .tab-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* 列表项 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        .list-item:hover {
            background: white;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        
        .list-item:last-child {
            margin-bottom: 0;
        }
        
        .item-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .item-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .item-icon.success {
            background: linear-gradient(135deg, var(--success-light), var(--success));
        }
        
        .item-icon.warning {
            background: linear-gradient(135deg, var(--warning-light), var(--warning));
        }
        
        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .item-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }
        
        .item-meta {
            font-size: 12px;
            color: var(--text-tertiary);
            display: flex;
            gap: 8px;
        }
        
        .item-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .item-right {
            text-align: right;
        }
        
        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .item-change {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            font-weight: 500;
        }
        
        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        /* 环形图 */
        .chart-container {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 20px 0;
        }
        
        .donut-chart {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary) 0deg 120deg,
                var(--success) 120deg 240deg,
                var(--warning) 240deg 360deg
            );
            position: relative;
        }
        
        .donut-chart::after {
            content: attr(data-value);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
        }
        
        .chart-legend {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .legend-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }
        
        .legend-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .legend-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* 数据源开关 */
        .source-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .source-item:last-child {
            border-bottom: none;
        }
        
        .source-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .source-name {
            font-weight: 500;
            font-size: 14px;
        }
        
        .source-meta {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .toggle-switch {
            width: 44px; height: 24px;
            background: var(--bg-primary);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .toggle-switch.active {
            background: var(--primary);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: var(--shadow);
        }
        
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .nav-links { display: none; }
            .container { padding: 20px; }
            .page-title { font-size: 22px; }
            .stats-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 28px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <div>
                <div class="logo-text">XMeta</div>
                <div class="logo-subtitle">数字藏品分析系统</div>
            </div>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-link active">概览</a>
            <a href="#" class="nav-link">藏品</a>
            <a href="#" class="nav-link">发售</a>
            <a href="#" class="nav-link">数据源</a>
        </nav>
        <div class="header-right">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>运行正常</span>
            </div>
            <button class="refresh-btn" onclick="refreshData()">刷新</button>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">数字藏品监控</h1>
            <p class="page-subtitle">实时追踪全网数字藏品交易数据，提供价格监控、发售提醒与市场趋势分析</p>
        </div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>正在加载数据...</div>
        </div>

        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">总市值</span>
                        <span class="stat-trend trend-up">↑ +2.3%</span>
                    </div>
                    <div class="stat-value">¥30.5 亿</div>
                    <div class="stat-footer">近 24 小时</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">24h 交易量</span>
                        <span class="stat-trend trend-up">↑ +15.3%</span>
                    </div>
                    <div class="stat-value">35,845</div>
                    <div class="stat-footer">笔交易</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">告警</span>
                        <span class="stat-trend trend-down">↓ 3</span>
                    </div>
                    <div class="stat-value">37</div>
                    <div class="stat-footer">需关注</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">覆盖平台</span>
                        <span class="stat-trend" style="background: #e0e7ff; color: var(--primary);">+2</span>
                    </div>
                    <div class="stat-value">12</div>
                    <div class="stat-footer">数据源</div>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="content-grid">
                <!-- 左侧 -->
                <div>
                    <!-- 热门藏品 -->
                    <div class="section" style="margin-bottom: 24px;">
                        <div class="section-header">
                            <div class="section-title">
                                <span>🔥</span>
                                <span>热门藏品</span>
                            </div>
                            <div class="section-actions">
                                <button class="tab-btn active">热度</button>
                                <button class="tab-btn">涨幅</button>
                                <button class="tab-btn">成交量</button>
                            </div>
                        </div>
                        <div id="collectionList"></div>
                    </div>

                    <!-- 板块分布 -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span>📊</span>
                                <span>板块分布</span>
                            </div>
                            <span style="font-size: 12px; color: var(--text-tertiary);">近 24h</span>
                        </div>
                        <div class="chart-container">
                            <div class="donut-chart" data-value="1,284"></div>
                            <div class="chart-legend">
                                <div class="legend-item">
                                    <div class="legend-left">
                                        <div class="legend-dot" style="background: var(--primary);"></div>
                                        <span class="legend-label">基础设施</span>
                                    </div>
                                    <span class="legend-value">412</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-left">
                                        <div class="legend-dot" style="background: var(--success);"></div>
                                        <span class="legend-label">安全</span>
                                    </div>
                                    <span class="legend-value">318</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-left">
                                        <div class="legend-dot" style="background: var(--warning);"></div>
                                        <span class="legend-label">政策</span>
                                    </div>
                                    <span class="legend-value">241</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-left">
                                        <div class="legend-dot" style="background: #9ca3af;"></div>
                                        <span class="legend-label">其他</span>
                                    </div>
                                    <span class="legend-value">113</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧 -->
                <div>
                    <!-- 发售日历 -->
                    <div class="section" style="margin-bottom: 24px;">
                        <div class="section-header">
                            <div class="section-title">
                                <span>📅</span>
                                <span>发售日历</span>
                            </div>
                            <a href="#" style="font-size: 12px; color: var(--primary); text-decoration: none;">查看全部</a>
                        </div>
                        <div id="releaseList"></div>
                    </div>

                    <!-- 数据源 -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span>🔌</span>
                                <span>数据源</span>
                            </div>
                            <span style="font-size: 12px; color: var(--text-tertiary);">已启用 3 / 4</span>
                        </div>
                        <div id="sourceList"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_CONFIG = {
            appId: 'a134eb307ad7429a9c5acd057f3de519',
            baseUrl: 'https://xmeta.x-metash.cn/api'
        };

        const mockData = {
            collections: [
                { id: 1, name: '朱墨三色锦鲤', platform: '鲸探', price: 1.00, change: 2.5, volume: 422026, icon: '🎨' },
                { id: 2, name: '黑白双色锦鲤', platform: '鲸探', price: 1.42, change: -1.2, volume: 159059, icon: '🎨' },
                { id: 3, name: '金刚菩提子', platform: '鲸探', price: 1.11, change: 0.8, volume: 40101, icon: '💎' },
                { id: 4, name: '小金猫', platform: '鲸探', price: 30.18, change: 5.2, volume: 10331, icon: '🐱' },
                { id: 5, name: '长春园铜麒麟', platform: '鲸探', price: 106.0, change: -2.1, volume: 254, icon: '🦄' }
            ],
            releases: [
                { time: '今天 12:00', name: '晚来急雨添飞瀑图', platform: '鲸探', price: 60, limit: 8000 },
                { time: '今天 12:00', name: '苏轼《楷书祭黄几道文》', platform: '鲸探', price: 60, limit: 8000 },
                { time: '明天 11:00', name: 'KOOMAN•贤勇将军李信', platform: '鲸探', price: 40, limit: 8000 }
            ],
            sources: [
                { name: '36Kr', delay: '18s', weight: 0.9, active: true },
                { name: 'The Verge', delay: '24s', weight: 0.8, active: true },
                { name: 'TechCrunch', delay: '31s', weight: 0.6, active: false },
                { name: 'Reddit', delay: '8s', weight: 0.7, active: true }
            ]
        };

        function renderCollections() {
            document.getElementById('collectionList').innerHTML = mockData.collections.map(c => `
                <div class="list-item">
                    <div class="item-left">
                        <div class="item-icon">${c.icon}</div>
                        <div class="item-info">
                            <div class="item-name">${c.name}</div>
                            <div class="item-meta">
                                <span>${c.platform}</span>
                                <span>•</span>
                                <span>在售 ${c.volume.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-price">¥${c.price < 10 ? c.price.toFixed(2) : c.price.toLocaleString()}</div>
                        <div class="item-change" style="background: ${c.change >= 0 ? 'var(--success-light)' : 'var(--danger-light)'}; color: ${c.change >= 0 ? 'var(--success)' : 'var(--danger)'}">
                            ${c.change >= 0 ? '↑' : '↓'} ${Math.abs(c.change)}%
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderReleases() {
            document.getElementById('releaseList').innerHTML = mockData.releases.map(r => `
                <div class="list-item">
                    <div class="item-left">
                        <div class="item-icon warning">📅</div>
                        <div class="item-info">
                            <div class="item-name">${r.name}</div>
                            <div class="item-meta">
                                <span>${r.time}</span>
                                <span>•</span>
                                <span>限量 ${r.limit}</span>
                            </div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-price">¥${r.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderSources() {
            document.getElementById('sourceList').innerHTML = mockData.sources.map(s => `
                <div class="source-item">
                    <div class="source-info">
                        <div class="source-name">${s.name}</div>
                        <div class="source-meta">delay ~ ${s.delay} · w=${s.weight}</div>
                    </div>
                    <div class="toggle-switch ${s.active ? 'active' : ''}" onclick="this.classList.toggle('active')"></div>
                </div>
            `).join('');
        }

        async function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            
            try {
                const response = await fetch(`${API_CONFIG.baseUrl}/v1/market/overview`, {
                    headers: { 'X-App-ID': API_CONFIG.appId }
                });
                if (response.ok) {
                    const data = await response.json();
                    console.log('真实数据:', data);
                }
            } catch (e) {
                console.log('使用模拟数据');
            }
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                renderCollections();
                renderReleases();
                renderSources();
            }, 600);
        }

        // 初始化
        refreshData();
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
